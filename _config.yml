# ============================================================
#  _config.yml  —  Site-wide settings for your GitHub Pages site
# ============================================================
#  This file controls your WHOLE site: the THEME (design), the
#  TITLE/TAGLINE shown in the top banner, and a few options.
#  Edit a value -> Commit -> your live site rebuilds in ~1 min.
#
#  Lines starting with "#" are COMMENTS. They do nothing on the
#  site; they only explain things. Delete them anytime.
# ============================================================


# ---- THEME (the whole design / skin of the site) -----------
#  Change ONLY the word after "jekyll-theme-" to restyle the
#  ENTIRE site in one line. Supported options:
#
#    jekyll-theme-cayman      clean, modern, big hero  <-- chosen
#    jekyll-theme-minimal     left sidebar + content, resume-like
#    jekyll-theme-architect   wide, simple, neutral
#    jekyll-theme-modernist   compact, classic
#    jekyll-theme-slate       dark header, developer feel
#    jekyll-theme-midnight    full dark mode, techy
#    jekyll-theme-dinky        jekyll-theme-merlot     jekyll-theme-tactile
#    jekyll-theme-leap-day     jekyll-theme-time-machine   jekyll-theme-hacker
#
#  For an industry / portfolio site, "cayman" or "minimal" look best.
theme: jekyll-theme-cayman


# ---- HEADER TEXT (shows in the colored banner at the top) ---
#  title       = the BIG text in the banner  ->  use your name
#  description = the small line under it      ->  your one-line pitch
title: Dongsoo Lee
description: ML Scientist & Biostatistics PhD candidate — statistical learning for genomics & medical AI


# ---- OPTIONS -----------------------------------------------
#  The Cayman theme normally shows ".zip / .tar.gz" download
#  buttons that are meant for software projects. Set this to
#  false to HIDE them (cleaner for a personal/portfolio site).
show_downloads: false
